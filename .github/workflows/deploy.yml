name: CI/CD Pipeline

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          # Use a dummy URL for builds without database connection
          # The app's lazy-loaded connection won't fail during build
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7

  # Note: This app cannot be deployed to GitHub Pages because it uses API routes
  # which require a Node.js server. Consider deploying to:
  # - Vercel (recommended for Next.js)
  # - Netlify
  # - Railway
  # - Render
  # See README.md for deployment instructions
