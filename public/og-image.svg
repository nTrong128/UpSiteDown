<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Upload icon -->
  <g transform="translate(500, 180)">
    <circle cx="100" cy="100" r="80" fill="white" fill-opacity="0.1"/>
    <path d="M100 60 L100 140 M100 60 L70 90 M100 60 L130 90" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M60 160 L140 160" stroke="white" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    UpSiteDown
  </text>
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="32" fill="white" fill-opacity="0.9" text-anchor="middle">
    Upload and share images easily
  </text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="24" fill="white" fill-opacity="0.7" text-anchor="middle">
    Upload up to 100 images at once • Fast • Free
  </text>
</svg>
